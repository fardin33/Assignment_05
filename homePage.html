<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Issues Tracker</title>

    <!-- DaisyUI + Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <style>
      .geist {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>

  <body class="geist bg-[#F8FAFC]">
    <!--================= Navbar ==============-->
    <header class="bg-white border-b border-[#E9E9E9] shadow-xs">
      <div
        class="px-10 lg:px-18 py-4 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 sm:gap-0"
      >
        <!--========= logo & title =========-->
        <div class="flex items-center gap-2 mb-2">
          <img
            src="./assets/images/github-logo.png"
            alt="logo"
            class="w-8 h-8 object-contain"
          />
          <h1 class="text-xl font-semibold">GitHub Issues Tracker</h1>
        </div>

        <!--=========== search & button ===========-->
        <div
          class="flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-4 w-full sm:w-auto"
        >
          <input
            type="text"
            placeholder="Search issue.."
            class="border border-[#E4E4E7] rounded-lg px-4 py-2 text-md w-full sm:w-72 focus:outline-none focus:ring-2 focus:ring-[#4A00FF] mb-1"
          />
          <button
            type="button"
            class="bg-[#4A00FF] text-white px-4 py-2 rounded-lg text-base font-semibold hover:bg-black w-full sm:w-auto"
          >
            <i class="fa-solid fa-plus"></i> New Issue
          </button>
        </div>
      </div>
    </header>

    <!-- Main Section -->
    <main class="w-full lg:w-[85%] mx-auto px-6 py-8 min-h-screen">
      <!--================= All, Open , Closed Tabs =============-->
      <div
        class="bg-white w-full rounded-lg shadow-sm p-3 sm:p-5 flex flex-wrap gap-2"
      >
        <button
          class="bg-[#4A00FF] text-white px-8 py-1 rounded-md text-md font-medium border border-[#E4E4E7]"
        >
          All
        </button>

        <button
          class="text-gray-600 px-8 py-1 text-md font-medium hover:bg-gray-100 rounded-md border border-[#E4E4E7]"
        >
          Open
        </button>

        <button
          class="text-gray-600 px-8 py-1 text-md font-medium hover:bg-gray-100 rounded-md border border-[#E4E4E7]"
        >
          Closed
        </button>
      </div>

      <!--================= Issues Main Section =================-->
      <div class="bg-white rounded-xl shadow-sm mt-6 p-6 w-full mx-auto">
        <!--============== Issues Header Part ===========-->
        <div
          class="flex flex-col sm:flex-row items-start sm:items-center justify-between mb-6 gap-4"
        >
          <!-- Left Part: Icon + Title -->
          <div class="flex gap-3 items-center">
            <img
              src="./assets/images/Aperture.png"
              alt="Not Found"
              class="w-11 h-11 bg-purple-100 rounded-full p-1"
            />
            <div>
              <h2
                id="issues-count"
                class="font-semibold text-xl text-[#1F2937]"
              >
                50 Issues
              </h2>
              <p class="text-[15px] text-[#64748B]">
                Track and manage your project issues
              </p>
            </div>
          </div>

          <!-- Right Part: Status Indicators -->
          <div class="flex gap-6 text-sm">
            <div class="flex items-center gap-2">
              <span class="w-3 h-3 bg-green-500 rounded-full"></span>
              Open
            </div>

            <div class="flex items-center gap-2">
              <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
              Closed
            </div>
          </div>
        </div>

        <!-- ================= Grid Card Boxes ===============-->
        <div
          id="issues-container"
          class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-7"
        ></div>

        <!--================ Modal Codes ==============-->
        <dialog id="issue_modal" class="modal">
          <div class="modal-box w-[300px] lg:w-2xl rounded-xl p-5">
            <!--============= Modal Title : =============-->
            <h2
              id="modal-title"
              class="text-sm lg:text-2xl font-semibold mb-2"
            ></h2>
            <div
              id="modal-status"
              class="flex items-center gap-3 text-[13px] lg:text-[15px] text-gray-500 mb-4"
            ></div>
            <div id="modal-tags" class="flex gap-2 mb-4"></div>
            <p id="modal-description" class="text-gray-600 mb-6"></p>
            <div
              class="bg-gray-100 rounded-lg p-4 flex justify-between items-center mb-6"
            >
              <div>
                <p class="text-sm text-gray-500 mb-2">Assignee:</p>
                <p id="modal-assignee" class="font-semibold"></p>
              </div>
              <div class="text-right">
                <p class="text-sm text-gray-500 mb-2">Priority :</p>
                <span
                  id="modal-priority"
                  class="badge bg-red-500 text-white border-none p-3.5"
                ></span>
              </div>
            </div>
            <div class="text-right">
              <form method="dialog">
                <button
                  class="btn border-none rounded-md bg-purple-600 text-white hover:bg-purple-700"
                >
                  Close
                </button>
              </form>
            </div>
          </div>
        </dialog>
      </div>
    </main>

    <!-- Js Linkup -->
    <script src="./js/index.js"></script>
  </body>
</html>
