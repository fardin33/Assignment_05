<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Issues Tracker</title>

    <!-- DaisyUI + Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <style>
      .geist {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>

  <body class="geist bg-[#F8FAFC]">
    <!--================= Navbar ==============-->
    <header class="bg-white border-b border-[#E9E9E9] shadow-xs">
      <div class="px-15 py-4 flex items-center justify-between">
        <!-- Left side: logo + title -->
        <div class="flex items-center gap-2">
          <!-- Logo -->
          <img
            src="./assets/images/github-logo.png"
            alt="logo"
            class="w-8 h-8 object-contain"
          />
          <!-- Title -->
          <h1 class="text-xl font-semibold">GitHub Issues Tracker</h1>
        </div>

        <!-- Right side: search + button -->
        <div class="flex items-center gap-4">
          <input
            type="text"
            placeholder="Search issue.."
            class="border border-[#E4E4E7] rounded-lg px-4 py-2 text-md w-70 focus:outline-none focus:ring-2 focus:ring-[#4A00FF]"
          />

          <button
            type="button"
            class="bg-[#4A00FF] text-white px-4 py-2 rounded-lg text-base font-semibold hover:bg-black"
          >
            <i class="fa-solid fa-plus"></i> New Issue
          </button>
        </div>
      </div>
    </header>

    <!-- Main Section -->
    <main class="max-w-[80%] mx-auto px-6 py-8 min-h-screen">
      <!--================= All, Open , Closed Tabs =============-->
      <div class="bg-white w-full rounded-lg shadow-sm p-5 inline-flex gap-2">
        <button
          class="bg-[#4A00FF] text-white px-8 py-1 rounded-md text-md font-medium border border-[#E4E4E7]"
        >
          All
        </button>

        <button
          class="text-gray-600 px-8 py-1 ext-md font-medium hover:bg-gray-100 rounded-md border border-[#E4E4E7]"
        >
          Open
        </button>

        <button
          class="text-gray-600 px-8 py-1 ext-md font-medium hover:bg-gray-100 rounded-md border border-[#E4E4E7]"
        >
          Closed
        </button>
      </div>

      <!--================= Issues Main Section =================-->
      <div class="bg-white rounded-xl shadow-sm mt-6 p-6">
        <!--============== Issues Header Part ===========-->
        <div class="flex items-center justify-between mb-6">
          <div class="flex gap-3 items-center justify-center">
            <img
              src="./assets/images/Aperture.png"
              alt="Not Fount"
              class="w-11 h-11 bg-purple-100 rounded-full p-1"
            />
            <div>
              <h2 class="font-semibold text-xl text-[#1F2937]">50 Issues</h2>
              <p class="text-[15px] text-[#64748B]">
                Track and manage your project issues
              </p>
            </div>
          </div>

          <div class="flex gap-6 text-sm">
            <div class="flex items-center gap-2">
              <span class="w-3 h-3 bg-green-500 rounded-full"></span>
              Open
            </div>

            <div class="flex items-center gap-2">
              <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
              Closed
            </div>
          </div>
        </div>

        <!-- ================= Grid Boxes ===============-->
        <div
          class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"
        >
          <!--================ Card Design ==============-->
          <div
            class="border-t-4 border-[#00A96E] rounded-xl p-4 shadow-md hover:shadow-lg transition"
          >
            <div class="flex justify-between items-center mb-3">
              <img
                src="./assets/images/Open-Status.png"
                alt="Not Found"
                class="w-8 h-8"
              />
              <span
                class="bg-[#FEECEC] text-[#EF4444] font-medium text-xs px-5 py-1.5 rounded-full"
                >HIGH</span
              >
            </div>

            <h3 class="font-semibold text-sm mb-1">
              Fix Navigation Menu On Mobile <br />
              Devices
            </h3>

            <p class="text-xs text-gray-500 mb-3">
              The navigation menu doesn't collapse properly on mobile devices.
            </p>

            <div
              class="flex gap-2 mb-4 items-center pb-4 border-b-2 border-[#E4E4E7]"
            >
              <span
                class="bg-[#FEECEC] text-[#EF4444] font-medium text-xs px-4 py-1.5 rounded-full"
              >
                <i class="fa-solid fa-bug"></i>
                BUG</span
              >
              <span
                class="bg-yellow-100 text-[#D97706] text-xs font-medium px-3 py-1.5 rounded-full"
              >
                <i class="fa-solid fa-life-ring"></i>
                HELP WANTED</span
              >
            </div>

            <p class="text-xs text-[#64748B] mb-2">#1 by john_doe</p>
            <p class="text-xs text-[#64748B]">11/15/2024</p>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
